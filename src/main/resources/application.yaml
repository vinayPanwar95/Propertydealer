server:
  port: 8081

app:
  admin:
    username: ${ADMIN_USER_NAME}
    password: ${ADMIN_USER_PASSWORD}

  mail:
    from: shreeenathjiassociates@gmail.com
    recipient: shreeenathjiassociates@gmail.com


spring:
  datasource:
    url: jdbc:postgresql://ep-wispy-hall-ap2iludz-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SMTP_USER_NAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        debug: false
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

logging:
  level:
    root: INFO