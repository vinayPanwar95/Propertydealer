<!DOCTYPE html>
<html>
<head>
	<title>Admin Dashboard</title>

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">

	<style>
		body {
            background: #f4f6f9;
            font-family: "Segoe UI", sans-serif;
        }

        .pg-topbar {
            background: #0b1f3a;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pg-btn {
            background: #f5b301;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: 600;
            color: black;
            text-decoration: none;
        }

        .pg-btn:hover {
            background: #e0a800;
        }

        table {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        thead {
            background: #0b1f3a;
            color: white;
        }

        img {
            border-radius: 8px;
        }
	</style>
</head>

<body class="p-3">

<div class="pg-topbar">
	<div>
		<h4 style="margin:0;">Admin</h4>
		<small>Manage Listings</small>
	</div>

	<a href="/admin/add" class="pg-btn">+ Add Property</a>
</div>

<table class="table">
	<thead>
	<tr>
		<th>Photo</th>
		<th>Name</th>
		<th>Location</th>
		<th>Price</th>
		<th>Action</th>
	</tr>
	</thead>

	<tbody id="propertiesBody"></tbody>
</table>

<!-- KEEP YOUR ORIGINAL JS (UNCHANGED FUNCTIONALITY) -->
<script>
	async function loadProperties() {
        try {
            const resp = await fetch('/admin/properties');
            const list = await resp.json();
            const tbody = document.getElementById('propertiesBody');
            tbody.innerHTML = '';

            list.forEach(p => {
                const tr = document.createElement('tr');

                const photoTd = document.createElement('td');
                if (p.mediaUrls && p.mediaUrls.length > 0) {
                    const img = document.createElement('img');
                    img.src = p.mediaUrls[0];
                    img.style.height = '70px';
                    photoTd.appendChild(img);
                } else {
                    photoTd.textContent = '-';
                }
                tr.appendChild(photoTd);

                const nameTd = document.createElement('td');
                nameTd.textContent = p.name;
                tr.appendChild(nameTd);

                const locTd = document.createElement('td');
                locTd.textContent = p.location;
                tr.appendChild(locTd);

                const priceTd = document.createElement('td');
                priceTd.textContent = p.price;
                tr.appendChild(priceTd);

                const actionTd = document.createElement('td');

                const del = document.createElement('button');
                del.className = 'btn btn-danger btn-sm';
                del.textContent = 'Delete';

                del.onclick = async function () {
                    const confirmed = confirm("Delete this property?");
                    if (!confirmed) return;

                    await fetch('/admin/delete/' + p.id, { method: 'GET' });
                    loadProperties();
                };

                actionTd.appendChild(del);
                tr.appendChild(actionTd);

                tbody.appendChild(tr);
            });

        } catch (e) {
            console.error(e);
        }
    }

    document.addEventListener('DOMContentLoaded', loadProperties);
</script>

</body>
</html>
