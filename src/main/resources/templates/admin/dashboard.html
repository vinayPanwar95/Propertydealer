<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Shree Nath Ji Associates</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Inter, "Segoe UI", sans-serif;
            background: #f4f6f9;
            color: #1f2937;
        }

        .admin-navbar {
            background: #0b1f3a;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .admin-navbar .brand {
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-navbar .brand i {
            color: #f5b301;
        }

        .admin-navbar .nav-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-accent {
            background: #f5b301;
            border: none;
            color: #000;
            font-weight: 700;
            padding: 8px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }

        .btn-accent:hover {
            background: #e0a800;
            color: #000;
        }

        .btn-nav-outline {
            border: 1.5px solid rgba(255,255,255,0.4);
            color: white;
            background: transparent;
            font-weight: 600;
            padding: 7px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-nav-outline:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            border-color: white;
        }

        .page-body {
            padding: 28px 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .section-header h5 {
            font-weight: 700;
            color: #0b1f3a;
            margin: 0;
        }

        .section-header small {
            color: #6b7280;
            font-size: 0.85rem;
        }

        .table-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .table {
            margin: 0;
        }

        .table thead {
            background: #0b1f3a;
            color: white;
        }

        .table thead th {
            font-weight: 600;
            font-size: 0.85rem;
            padding: 14px 16px;
            border: none;
            letter-spacing: 0.3px;
        }

        .table tbody td {
            vertical-align: middle;
            padding: 13px 16px;
            border-color: #f3f4f6;
            font-size: 0.9rem;
            color: #374151;
        }

        .table tbody tr:hover {
            background: #fafafa;
        }

        .prop-img {
            width: 72px;
            height: 52px;
            object-fit: cover;
            border-radius: 8px;
        }

        .prop-name {
            font-weight: 600;
            color: #0b1f3a;
        }

        .price-badge {
            font-weight: 700;
            color: #1e40af;
        }

        .btn-delete {
            background: #fee2e2;
            color: #dc2626;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-delete:hover {
            background: #fca5a5;
        }

        .btn-edit {
            background: #dbeafe;
            color: #1e40af;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-right: 6px;
        }

        .btn-edit:hover {
            background: #bfdbfe;
        }

        .badge-sold {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .badge-available {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 14px;
            display: block;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="admin-navbar">
    <a href="/admin" class="brand">
        <i class="fas fa-building"></i> Shree Nath Ji Associates
        <span style="font-size:0.75rem;font-weight:400;color:#94a3b8;margin-left:6px;">Admin</span>
    </a>
    <div class="nav-actions">
        <a href="/admin/add" class="btn-accent">
            <i class="fas fa-plus"></i> Add Property
        </a>
        <a href="/admin/reset-password" class="btn-nav-outline">
            <i class="fas fa-key"></i> Reset Password
        </a>
        <a href="/logout" class="btn-nav-outline">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</nav>

<!-- BODY -->
<div class="page-body">

    <div class="section-header">
        <div>
            <h5>Property Listings</h5>
            <small>Manage all property entries</small>
        </div>
    </div>

    <div class="table-card">
        <table class="table">
            <thead>
                <tr>
                    <th>Photo</th>
                    <th>Property Name</th>
                    <th>Location</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="propertiesBody">
                <tr>
                    <td colspan="5">
                        <div class="empty-state">
                            <i class="fas fa-spinner fa-spin"></i>
                            Loading...
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
    async function loadProperties() {
        try {
            const resp = await fetch('/admin/properties');
            const list = await resp.json();
            const tbody = document.getElementById('propertiesBody');

            if (list.length === 0) {
                tbody.innerHTML = `
                    <tr><td colspan="6">
                        <div class="empty-state">
                            <i class="fas fa-home"></i>
                            No properties yet. <a href="/admin/add">Add your first one</a>.
                        </div>
                    </td></tr>`;
                return;
            }

            tbody.innerHTML = '';
            list.forEach(p => {
                const tr = document.createElement('tr');

                const photoTd = document.createElement('td');
                if (p.mediaUrls && p.mediaUrls.length > 0) {
                    const img = document.createElement('img');
                    img.src = p.mediaUrls[0];
                    img.className = 'prop-img';
                    photoTd.appendChild(img);
                } else {
                    photoTd.innerHTML = '<span style="color:#9ca3af;font-size:0.8rem;">No photo</span>';
                }
                tr.appendChild(photoTd);

                const nameTd = document.createElement('td');
                nameTd.innerHTML = `<span class="prop-name">${p.name}</span>`;
                tr.appendChild(nameTd);

                const locTd = document.createElement('td');
                locTd.innerHTML = `<i class="fas fa-location-dot" style="color:#9ca3af;margin-right:5px;"></i>${p.location}`;
                tr.appendChild(locTd);

                const priceTd = document.createElement('td');
                priceTd.innerHTML = `<span class="price-badge">₹ ${p.price}</span>`;
                tr.appendChild(priceTd);

                const statusTd = document.createElement('td');
                statusTd.innerHTML = p.isSold
                    ? '<span class="badge-sold">SOLD</span>'
                    : '<span class="badge-available">Available</span>';
                tr.appendChild(statusTd);

                const actionTd = document.createElement('td');

                const edit = document.createElement('button');
                edit.className = 'btn-edit';
                edit.innerHTML = '<i class="fas fa-pen" style="margin-right:4px;"></i>Edit';
                edit.onclick = function () { openEditModal(p); };
                actionTd.appendChild(edit);

                const del = document.createElement('button');
                del.className = 'btn-delete';
                del.innerHTML = '<i class="fas fa-trash-alt" style="margin-right:4px;"></i>Delete';
                del.onclick = async function () {
                    if (!confirm('Delete "' + p.name + '"?')) return;
                    await fetch('/admin/delete/' + p.id, { method: 'GET' });
                    loadProperties();
                };
                actionTd.appendChild(del);
                tr.appendChild(actionTd);

                tbody.appendChild(tr);
            });
        } catch (e) {
            document.getElementById('propertiesBody').innerHTML =
                '<tr><td colspan="5" class="text-center text-danger py-4">Failed to load properties.</td></tr>';
        }
    }

    let editPropertyId = null;

    function openEditModal(p) {
        editPropertyId = p.id;
        document.getElementById('editName').value = p.name || '';
        document.getElementById('editDescription').value = p.description || '';
        document.getElementById('editPrice').value = p.price || '';
        document.getElementById('editLocation').value = p.location || '';
        document.getElementById('editIsSold').checked = !!p.isSold;
        document.getElementById('editError').style.display = 'none';
        new bootstrap.Modal(document.getElementById('editModal')).show();
    }

    document.addEventListener('DOMContentLoaded', function () {
        loadProperties();

        document.getElementById('editForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('editName').value,
                description: document.getElementById('editDescription').value,
                price: document.getElementById('editPrice').value,
                location: document.getElementById('editLocation').value,
                isSold: document.getElementById('editIsSold').checked
            };
            try {
                const resp = await fetch('/admin/api/property/' + editPropertyId, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!resp.ok) throw new Error('Server error');
                bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                loadProperties();
            } catch (err) {
                document.getElementById('editError').style.display = 'block';
            }
        });
    });
</script>

<!-- EDIT MODAL -->
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content" style="border-radius:16px;overflow:hidden;">
            <div class="modal-header" style="background:#0b1f3a;color:white;border:none;">
                <h5 class="modal-title" id="editModalLabel" style="font-weight:700;">
                    <i class="fas fa-pen" style="color:#f5b301;margin-right:8px;"></i>Edit Property
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" style="padding:28px;">
                <div id="editError" class="alert alert-danger" style="display:none;">
                    Failed to save changes. Please try again.
                </div>
                <form id="editForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-600" style="font-weight:600;color:#374151;">Property Name</label>
                            <input type="text" id="editName" class="form-control" placeholder="e.g. Green Valley Plot" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" style="font-weight:600;color:#374151;">Location</label>
                            <input type="text" id="editLocation" class="form-control" placeholder="e.g. Dehradun, Uttarakhand">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label" style="font-weight:600;color:#374151;">Price</label>
                            <input type="text" id="editPrice" class="form-control" placeholder="e.g. 45 Lakh">
                        </div>
                        <div class="col-md-6 d-flex align-items-end">
                            <div class="form-check" style="margin-bottom:8px;">
                                <input class="form-check-input" type="checkbox" id="editIsSold" style="width:18px;height:18px;margin-top:2px;">
                                <label class="form-check-label" for="editIsSold" style="font-weight:600;color:#374151;margin-left:8px;">
                                    Mark as Sold
                                </label>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label" style="font-weight:600;color:#374151;">Description</label>
                            <textarea id="editDescription" class="form-control" rows="3" placeholder="Property description..."></textarea>
                        </div>
                    </div>
                    <div class="d-flex justify-content-end gap-2 mt-4">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn" style="background:#1e40af;color:white;font-weight:700;padding:9px 24px;">
                            <i class="fas fa-save" style="margin-right:6px;"></i>Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
