<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Property | Shree Nath Ji Associates</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Inter, "Segoe UI", sans-serif;
            background: #f4f6f9;
            color: #1f2937;
        }

        .admin-navbar {
            background: #0b1f3a;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .admin-navbar .brand {
            color: white;
            font-weight: 800;
            font-size: 1.2rem;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-navbar .brand i {
            color: #f5b301;
        }

        .btn-nav-outline {
            border: 1.5px solid rgba(255,255,255,0.4);
            color: white;
            background: transparent;
            font-weight: 600;
            padding: 7px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-nav-outline:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            border-color: white;
        }

        .page-body {
            padding: 32px 24px;
            max-width: 760px;
            margin: 0 auto;
        }

        .form-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        .form-card-header {
            background: #0b1f3a;
            padding: 20px 28px;
        }

        .form-card-header h5 {
            color: white;
            font-weight: 700;
            margin: 0;
            font-size: 1.1rem;
        }

        .form-card-header small {
            color: #94a3b8;
            font-size: 0.82rem;
        }

        .form-card-body {
            padding: 28px;
        }

        .form-label {
            font-weight: 600;
            color: #374151;
            font-size: 0.88rem;
            margin-bottom: 6px;
        }

        .form-control,
        .form-control:focus {
            border-radius: 10px;
            border: 1.5px solid #e5e7eb;
            padding: 11px 14px;
            font-size: 0.93rem;
        }

        .form-control:focus {
            border-color: #0b1f3a;
            box-shadow: 0 0 0 3px rgba(11,31,58,0.08);
        }

        .form-control::placeholder {
            color: #b0b7c3;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 110px;
        }

        .file-hint {
            font-size: 0.8rem;
            color: #9ca3af;
            margin-top: 5px;
        }

        .btn-save {
            background: #f5b301;
            border: none;
            color: #000;
            font-weight: 700;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 0.95rem;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-save:hover {
            background: #e0a800;
            color: #000;
        }

        .divider {
            border-top: 1px solid #f3f4f6;
            margin: 20px 0;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="admin-navbar">
    <a href="/admin" class="brand">
        <i class="fas fa-building"></i> Shree Nath Ji Associates
        <span style="font-size:0.75rem;font-weight:400;color:#94a3b8;margin-left:6px;">Admin</span>
    </a>
    <div style="display:flex;gap:10px;">
        <a href="/admin" class="btn-nav-outline">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>
        <a href="/logout" class="btn-nav-outline">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</nav>

<!-- BODY -->
<div class="page-body">

    <div class="form-card">

        <div class="form-card-header">
            <h5><i class="fas fa-plus-circle" style="margin-right:8px;color:#f5b301;"></i>Add New Property</h5>
            <small>Fill in the details below to list a new property</small>
        </div>

        <div class="form-card-body">
            <form method="post" action="/admin/add" enctype="multipart/form-data">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Property Name</label>
                        <input name="name" class="form-control" placeholder="e.g. Green Valley Farm" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Location</label>
                        <input name="location" class="form-control" placeholder="e.g. Haridwar, Uttarakhand" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Price</label>
                        <input name="price" class="form-control" placeholder="e.g. 45 Lakh" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Video URL <span style="color:#9ca3af;font-weight:400;">(optional)</span></label>
                        <input name="videoUrl" class="form-control" placeholder="YouTube or Drive link">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" placeholder="Describe the property — size, features, highlights..."></textarea>
                    </div>

                    <div class="col-12">
                        <div class="divider"></div>
                        <label class="form-label">Upload Photos / Videos</label>
                        <input type="file" name="media" class="form-control" multiple accept="image/*,video/*">
                        <p class="file-hint"><i class="fas fa-info-circle"></i> You can select multiple files. Supported: JPG, PNG, MP4, etc.</p>
                    </div>

                    <div class="col-12 mt-2">
                        <button type="submit" class="btn-save">
                            <i class="fas fa-save" style="margin-right:8px;"></i>Save Property
                        </button>
                    </div>

                </div>

            </form>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
