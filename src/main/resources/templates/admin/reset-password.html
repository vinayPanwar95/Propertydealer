<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Inter, "Segoe UI", sans-serif;
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-wrapper {
            width: 100%;
            max-width: 480px;
        }

        .top-bar {
            background: #0b1f3a;
            border-radius: 14px 14px 0 0;
            padding: 20px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-bar .title {
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            margin: 0;
        }

        .top-bar .subtitle {
            color: #94a3b8;
            font-size: 0.82rem;
            margin: 0;
        }

        .top-bar i.fa-lock {
            font-size: 1.8rem;
            color: #f5b301;
        }

        .form-card {
            background: white;
            border-radius: 0 0 14px 14px;
            padding: 36px 32px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        }

        .form-label {
            font-weight: 600;
            color: #374151;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 10px;
            border: 1.5px solid #e5e7eb;
            padding: 12px 14px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: #0b1f3a;
            box-shadow: 0 0 0 3px rgba(11, 31, 58, 0.1);
        }

        .input-group .form-control {
            border-radius: 10px 0 0 10px;
            border-right: none;
        }

        .input-group-text {
            border-radius: 0 10px 10px 0;
            border: 1.5px solid #e5e7eb;
            border-left: none;
            background: #f9fafb;
            color: #6b7280;
            cursor: pointer;
        }

        .btn-reset {
            background: #0b1f3a;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            color: white;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .btn-reset:hover {
            background: #1e3a5f;
            color: white;
        }

        .alert {
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .divider {
            border-top: 1px solid #e5e7eb;
            margin: 24px 0 20px;
        }

        .back-link {
            text-align: center;
            font-size: 0.85rem;
        }

        .back-link a {
            color: #0b1f3a;
            font-weight: 600;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card-wrapper">

    <!-- Top Bar -->
    <div class="top-bar">
        <div>
            <p class="title">Reset Password</p>
            <p class="subtitle">Update your admin account password</p>
        </div>
        <i class="fas fa-lock"></i>
    </div>

    <!-- Form Card -->
    <div class="form-card">

        <!-- Success message -->
        <div th:if="${success}" class="alert alert-success" role="alert">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${success}"></span>
        </div>

        <!-- Error message -->
        <div th:if="${error}" class="alert alert-danger" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${error}"></span>
        </div>

        <form method="post" action="/admin/reset-password">

            <div class="mb-3">
                <label class="form-label" for="oldPassword">Current Password</label>
                <div class="input-group">
                    <input type="password" id="oldPassword" name="oldPassword" class="form-control"
                           placeholder="Enter current password" required autocomplete="current-password">
                    <span class="input-group-text" onclick="toggle('oldPassword', 'eyeOld')">
                        <i class="fas fa-eye" id="eyeOld"></i>
                    </span>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label" for="newPassword">New Password</label>
                <div class="input-group">
                    <input type="password" id="newPassword" name="newPassword" class="form-control"
                           placeholder="Enter new password" required autocomplete="new-password">
                    <span class="input-group-text" onclick="toggle('newPassword', 'eyeNew')">
                        <i class="fas fa-eye" id="eyeNew"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn-reset">
                <i class="fas fa-key me-2"></i> Update Password
            </button>

        </form>

        <div class="divider"></div>

        <div class="back-link">
            <a href="/admin"><i class="fas fa-arrow-left me-1"></i> Back to Dashboard</a>
        </div>

    </div>
</div>

<script>
    function toggle(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>

</body>
</html>
