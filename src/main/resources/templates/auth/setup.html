<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup | Shree Nath Ji Associates</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Inter, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .setup-card {
            background: white;
            border-radius: 18px;
            padding: 48px 40px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand i {
            font-size: 2.8rem;
            color: #1e40af;
        }

        .brand h2 {
            font-weight: 800;
            color: #1e40af;
            margin-top: 10px;
            font-size: 1.5rem;
        }

        .brand p {
            color: #6b7280;
            font-size: 0.9rem;
            margin: 0;
        }

        .setup-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 6px;
        }

        .setup-subtitle {
            color: #6b7280;
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        .form-label {
            font-weight: 600;
            color: #374151;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 10px;
            border: 1.5px solid #e5e7eb;
            padding: 12px 14px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: #1e40af;
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.12);
        }

        .input-group-text {
            border-radius: 0 10px 10px 0;
            border: 1.5px solid #e5e7eb;
            border-left: none;
            background: #f9fafb;
            color: #6b7280;
            cursor: pointer;
        }

        .input-group .form-control {
            border-radius: 10px 0 0 10px;
            border-right: none;
        }

        .btn-setup {
            background: #1e40af;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            color: white;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .btn-setup:hover {
            background: #1d4ed8;
            color: white;
        }

        .alert {
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .divider {
            border-top: 1px solid #e5e7eb;
            margin: 24px 0 20px;
        }

        .back-link {
            text-align: center;
            font-size: 0.85rem;
            color: #6b7280;
        }

        .back-link a {
            color: #1e40af;
            font-weight: 600;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .notice-box {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: #1e40af;
            margin-bottom: 24px;
        }

        .notice-box i {
            margin-right: 6px;
        }
    </style>
</head>
<body>

<div class="setup-card">

    <!-- Brand -->
    <div class="brand">
        <i class="fas fa-building"></i>
        <h2>Shree Nath Ji Associates</h2>
        <p>Property Management Platform</p>
    </div>

    <p class="setup-title">Create Admin Account</p>
    <p class="setup-subtitle">Set up the administrator credentials for this platform. This can only be done once.</p>

    <!-- Success message -->
    <div th:if="${success}" class="alert alert-success" role="alert">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${success}"></span>
        <div class="mt-2">
            <a href="/login" style="color:#155724;font-weight:600;">Go to Login &rarr;</a>
        </div>
    </div>

    <!-- Error message -->
    <div th:if="${error}" class="alert alert-danger" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${error}"></span>
    </div>

    <!-- Setup Form -->
    <form method="post" action="/auth/setup">
        <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control"
                   placeholder="Enter admin username" required autocomplete="username">
        </div>

        <div class="mb-4">
            <label class="form-label" for="password">Password</label>
            <div class="input-group">
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Enter a strong password" required autocomplete="new-password">
                <span class="input-group-text" onclick="togglePassword()">
                    <i class="fas fa-eye" id="eyeIcon"></i>
                </span>
            </div>
        </div>

        <button type="submit" class="btn-setup">
            <i class="fas fa-user-shield me-2"></i> Create Admin Account
        </button>
    </form>

    <div class="divider"></div>

    <div class="back-link">
        <a href="/"><i class="fas fa-arrow-left me-1"></i> Back to Home</a>
    </div>

</div>

<script>
    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>

</body>
</html>
