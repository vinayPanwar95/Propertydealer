<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featured Properties | Shree Nath Ji Associates</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',sans-serif;background:#f7f8fc;color:#1f2937;}

        .navbar{
            background:white!important;
            border-bottom:1px solid #e5e7eb;
        }

        .navbar-brand{
            font-weight:800;
            color:#2563eb!important;
        }

        .nav-link{
            font-weight:600;
            color:#374151 !important;
            margin-left:12px;
        }

        .nav-link:hover{
            color:#2563eb !important;
        }

        .nav-home{
            background:#2563eb;
            color:white !important;
            padding:6px 14px;
            border-radius:10px;
        }

        .nav-home:hover{
            background:#1d4ed8;
            color:white !important;
        }

        .properties-hero{
            height:45vh;
            background:linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
            url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?q=80&w=1600&auto=format&fit=crop')
            center/cover;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
        }

        .hero-content h1{color:white;font-size:4rem;font-weight:800;}
        .hero-content p{color:#f3f4f6;}

        .properties-section{padding:70px 0;}

        .property-card{
            background:white;
            border-radius:18px;
            overflow:hidden;
            border:1px solid #e5e7eb;
            transition:0.3s;
            height:100%;
        }

        .property-card:hover{
            transform:translateY(-6px);
            box-shadow:0 15px 40px rgba(0,0,0,0.08);
        }

        .property-image{
            width:100%;
            padding:10px;
            background:#f9fafb;
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:8px;
            position:relative;
        }

        .property-image img{
            width:100%;
            height:160px;
            object-fit:cover;
            border-radius:12px;
            cursor:pointer;
        }

        .video-big-btn{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            width:100%;
            padding:14px;
            margin-top:10px;
            background:#ef4444;
            color:white;
            border-radius:12px;
            font-weight:700;
            text-decoration:none;
            font-size:15px;
        }

        .video-big-btn:hover{
            background:#dc2626;
        }

        .price{
            font-size:1.8rem;
            font-weight:800;
            color:#2563eb;
        }

        .btn-view-details{
            width:100%;
            background:#2563eb;
            border:none;
            color:white;
            padding:13px;
            border-radius:12px;
            font-weight:700;
        }

        .lightbox{
            display:none;
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.92);
            justify-content:center;
            align-items:center;
            z-index:9999;
        }

        .lightbox img{
            max-width:85%;
            max-height:85%;
            border-radius:14px;
        }

        .close-btn{
            position:absolute;
            top:25px;
            right:35px;
            font-size:42px;
            color:white;
            cursor:pointer;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">

        <a class="navbar-brand" href="/">
            <i class="fas fa-building"></i> Shree Nath Ji Associates
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="nav">
            <ul class="navbar-nav">

                <!-- HOME BUTTON ADDED -->
                <li class="nav-item">
                    <a class="nav-link nav-home" href="/">
                        <i class="fas fa-home"></i> Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/contact/form">
                        Contact
                    </a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- HERO -->
<section class="properties-hero">
    <div class="hero-content">
        <h1>Featured Properties</h1>
        <p>Explore premium lands, residential & industrial properties</p>
    </div>
</section>

<!-- PROPERTIES -->
<section class="properties-section">
    <div class="container">
        <div class="row g-4">

            <div class="col-lg-4 col-md-6" th:each="p : ${properties}">

                <div class="property-card"
                     th:attr="data-images=${#strings.listJoin(p.mediaUrls, '||')}">

                    <div class="property-image">

                        <img th:each="media : ${p.mediaUrls}"
                             th:if="${p.mediaUrls != null and !p.mediaUrls.isEmpty()}"
                             th:src="${media}"
                             onclick="openGallery(this)" />

                        <a th:if="${p.videoUrl != null and !p.videoUrl.isEmpty()}"
                           th:href="${p.videoUrl}"
                           target="_blank"
                           class="video-big-btn">

                            <i class="fas fa-play-circle"></i>
                            Watch Property Video
                        </a>

                    </div>

                    <div class="property-card-body">
                        <h5 th:text="${p.name}"></h5>

                        <div class="location">
                            <i class="fas fa-location-dot"></i>
                            <span th:text="${p.location}"></span>
                        </div>

                        <div class="price" th:text="'₹ ' + ${p.price}"></div>

                        <button class="btn btn-view-details"
                                onclick="window.location.href='/contact/form'">
                            Contact for Details
                        </button>
                    </div>

                </div>

            </div>

        </div>
    </div>
</section>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox" onclick="closeGallery()">
    <span class="close-btn">&times;</span>
    <img id="lightbox-img">
</div>

<script>
    function openGallery(img){
        document.getElementById('lightbox').style.display = 'flex';
        document.getElementById('lightbox-img').src = img.src;
    }

    function closeGallery(){
        document.getElementById('lightbox').style.display = 'none';
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
